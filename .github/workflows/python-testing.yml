---
# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Lint and test workflow
on:
  push:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install non-python dependencies
        run: |
          sudo apt-get install -y graphviz-dev

      - name: Setup Python environment
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          environments: >-
            dev-only
          activate-environment: dev-only

      - name: isort
        run: isort contactseg/*.py -c

      - name: Black
        run: black contactseg --check

      - name: snakefmt
        run: snakefmt contactseg --check

  test:
    runs-on: ubuntu-latest
    needs: ["quality"]
    strategy:
      matrix:
        python-version: ["3.9","3.10","3.11","3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Pixi environment
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          activate-environment: true

      - name: Setup env for contactseg
        run: |
          echo "CONTACTSEG_CACHE_DIR=`pwd`/tests/data/contactseg_cache_dir" >> $GITHUB_ENV

      - name: Test single subject bids
        run: |
          pixi run contactseg tests/data/ test_out participant -np --label --transform